<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.mirror {
  position: relative;
  width: 100%;
  height: 100%;
}

/* Start button */
#startBtn {
  position: absolute;
  z-index: 20;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 14px 22px;
  border: none;
  border-radius: 12px;
  background: #ff4da6;
  color: white;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255, 77, 166, 0.4);
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  filter: brightness(1.05) contrast(1.1) saturate(1.2);
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(255,0,120,0.08), transparent 60%);
  pointer-events: none;
}

#intro {
  position: absolute;
  top: 18%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 26px;
  font-weight: 500;
  text-shadow: 0 0 20px rgba(255, 0, 120, 0.6);
  z-index: 5;
}

#name {
  color: #ff4da6;
  font-weight: bold;
}

/* hearts */
.heart {
  position: absolute;
  color: rgba(255, 77, 166, 0.6);
  font-size: 18px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0.8); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}
</style>
</head>

<body>

<div class="mirror">

  <button id="startBtn" onclick="startApp()">Start Mirror</button>

  <video id="video" autoplay playsinline muted></video>

  <div class="overlay"></div>

  <div id="intro">
    Me inne <span id="name">Laki 😒</span>
  </div>

  <!-- Hidden YouTube Player -->
  <div id="ytplayer" style="position:absolute;width:1px;height:1px;opacity:0;"></div>

</div>

<script>
const video = document.getElementById("video");
const btn = document.getElementById("startBtn");

let player;

// 🎥 Start camera + 🎵 music
async function startApp() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" }
    });

    video.srcObject = stream;
    btn.style.display = "none";

    // play music after user click
    if (player) player.playVideo();

  } catch (err) {
    console.log("Camera error:", err);
  }
}

/* =========================
   YOUTUBE PLAYER (YOUR SONG)
   ========================= */

function onYouTubeIframeAPIReady() {
  const VIDEO_ID = "89wwhr3235Q"; // your song

  player = new YT.Player('ytplayer', {
    height: '1',
    width: '1',
    videoId: VIDEO_ID,
    playerVars: {
      autoplay: 0,
      loop: 1,
      playlist: VIDEO_ID,
      controls: 0,
      modestbranding: 1
    }
  });
}

/* =========================
   HEARTS EFFECT
   ========================= */

function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.top = "100vh";
  heart.style.fontSize = (10 + Math.random() * 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 700);
</script>

<!-- YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>

</body>
</html>
