<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* mirror frame */
.mirror {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* video styling */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(1.05) contrast(1.1) saturate(1.2);
  transform: scaleX(-1);
}

/* soft romantic overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(255,0,120,0.08), transparent 60%);
  pointer-events: none;
}

/* text UI */
#intro {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 26px;
  font-weight: 500;
  text-shadow: 0 0 20px rgba(255, 0, 120, 0.6);
  animation: fadeIn 2s ease-in-out;
}

#name {
  color: #ff4da6;
  font-weight: bold;
}

/* floating hearts */
.heart {
  position: absolute;
  color: rgba(255, 77, 166, 0.6);
  font-size: 18px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0.8); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="mirror">
  <video id="video" autoplay playsinline muted></video>
  <div class="overlay"></div>

  <div id="intro">
    Hi ❤️ <span id="name">There</span>
  </div>
</div>

<script>
// camera
const video = document.getElementById("video");

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });
    video.srcObject = stream;
  } catch (err) {
    console.log(err);
  }
}

startCamera();

// floating hearts generator
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.top = "100vh";
  heart.style.fontSize = (10 + Math.random() * 20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 700);

// optional: change name
document.getElementById("name").innerText = "Her Name";
</script>

</body>
</html>
